<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halos</title>
  <style>
    * {
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      padding-bottom: 10px;
    }

    .item {}

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      padding: 15px;
      width: 100%;
      border-bottom: 1px solid black;
      font-size: 13pt;
    }

    a {
      color: black;
    }

    img {
      width: 75%;
      height: auto;
      display: block;
      margin: 40px auto;
      filter: drop-shadow(1px 3px 4px #00000078);
    }

    .container-category {
      display: grid;
      grid-template-columns: .8fr 1fr 1fr 1fr;
    }

    .container-name {
      display: grid;
      grid-template-columns: .8fr 1fr 1fr 1fr;
    }

    .container {
      position: relative;
      margin-top: 40px;
      bottom: 0;
      padding: 20px;
    }

    .name {
      font-size: 13pt;
      text-transform: uppercase;
    }

    .category {
      font-size: 13pt !important;
    }

    .back {
      top: 10px;
      text-decoration: none;
    }

    .line {
      border-top: 1px solid black;
      z-index: 2;
      top: 10px;
    }

    .line-back {
      border-top: 1px solid black;
      position: relative;
      top: 15px;
      z-index: 2;
    }

    .arrow-container {
      display: grid;
      grid-template-columns: 50% 50%;
    }

    .arrow-left {
      justify-content: start;
      font-size: 10pt;
    }

    .arrow-right {
      justify-self: end;
      font-size: 10pt;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
      filter: blur(20px);
      opacity: 50%;
    }

    .main-content {
      position: relative;
      z-index: 1;
    }

    @media screen and (max-width: 600px) {
      .category {
        font-size: 13px !important;
      }

      .name {
        font-size: 13px !important;
      }

      header {
        font-size: 10px;
      }

      .back {
        font-size: 10px;
      }

      img {
        margin-top: 40px;
        width: 100%;
        height: auto;
      }

      .container {
        position: relative;
        margin-top: 130px;
        bottom: 0;
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="iframe-background">
    <iframe src="../index.html" frameborder="0"></iframe>
  </div>
  <div class="main-content">
    <header>
      <div class="item">
        <a href="../index.html" class="back">← Back</a>
      </div>
    </header>
    <div class="background">
      <img src="1 - Jaffa Red Pomelo- Palestinian Colors.png" alt="jaffa">
    </div>
    <div class="container">
      <div class="line"></div>
      <div class="container-category">
        <div class="category">PLU</div>
        <div class="category">Fruit Kind</div>
        <div class="category">Country of Origin</div>
        <div class="category">Brand</div>
      </div>
      <div class="line"></div>
      <div class="container-name">
        <div class="name">#3129</div>
        <div class="name">Red Pomelo</div>
        <div class="name">Israel</div>
        <div class="name">Jaffa</div>
      </div>
      <div class="line"></div>
      <div class="arrow-container">
          <a class="arrow-left" href="halos.html">←</a>
          <a class="arrow-right" href="">→</a>
      </div>
    </div>
  </div>
  <script></script>
</body>

</html>
